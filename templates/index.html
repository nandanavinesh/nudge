<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nudge</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Nudge 🧠</h1>
        <p class="subtitle">Track your day. Understand yourself.</p>

        <div class="nav">
            <a href="/" class="active">Log Today</a>
            <a href="/dashboard">Dashboard</a>
        </div>

        <div class="form-card">
            <h2>Log Today</h2>

            <div class="form-group">
                <label>Date</label>
                <input type="date" id="date" />
            </div>

            <div class="form-group">
                <label>Social media screen time (hrs)</label>
                <input type="number" id="social_media" placeholder="e.g. 2.5" step="0.5" min="0" />
            </div>

            <div class="form-group">
                <label>Productive screen time (hrs)</label>
                <input type="number" id="productive_screen" placeholder="e.g. 3" step="0.5" min="0" />
            </div>

            <div class="form-group">
                <label>Tasks completed</label>
                <input type="number" id="tasks_completed" placeholder="e.g. 4" min="0" />
            </div>

            <div class="form-group">
                <label>Sleep hours</label>
                <input type="number" id="sleep_hours" placeholder="e.g. 7" step="0.5" min="0" />
            </div>

            <div class="form-group">
                <label>Mood (1 = terrible, 10 = amazing)</label>
                <input type="number" id="mood" placeholder="e.g. 7" min="1" max="10" />
            </div>

            <button onclick="submitLog()">Save Day</button>
            <p id="message"></p>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
